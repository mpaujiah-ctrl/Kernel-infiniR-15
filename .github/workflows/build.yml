name: Kernel InfiniR A15 - Upgrade KSUN 3.2.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (raystef66, branch 15.0)
        run: git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus kernel

      - name: Upgrade KernelSU-Next dari v1.39 (81dff86) ke v3.2.0 (00cb93e)
        run: |
          cd kernel
          rm -rf KernelSU-Next
          mkdir -p KernelSU-Next
          curl -sL "https://github.com/rifsxd/KernelSU-Next/archive/00cb93e0bc8bf3ca3680c7e8a3d7cf11d0b59071.tar.gz" -o ksun.tar.gz
          tar -xzf ksun.tar.gz -C KernelSU-Next --strip-components=1
          rm ksun.tar.gz
          ls KernelSU-Next/kernel/

      - name: Update defconfig localversion
        run: |
          cd kernel
          sed -i 's/CONFIG_LOCALVERSION="-InfiniR_cepheus_v1.39_KSUN"/CONFIG_LOCALVERSION="-InfiniR_cepheus_v3.2.0_KSUN"/' arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_LOCALVERSION" arch/arm64/configs/cepheus_defconfig

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          
          struct dt_info;
          
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"
      
      - name: Inject manual hook ke kernel/reboot.c (required by KSUN 3.2.0 Kbuild check)
        run: |
          cd kernel
          if ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            sed -i '/^SYSCALL_DEFINE4(reboot/i extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg4);' kernel/reboot.c
            sed -i '/if (magic1 != LINUX_REBOOT_MAGIC1/i \\tksu_handle_sys_reboot(magic1, magic2, cmd, (void __user **)&arg);' kernel/reboot.c
            echo "=== Hook injected ==="
            grep -n "ksu_handle_sys_reboot" kernel/reboot.c
          else
            echo "=== Hook sudah ada ==="
          fi
      
      - name: Upgrade SUSFS ke v2.1.0 (sinkron sama KSUN 3.2.0)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h
          grep "SUSFS_VERSION" include/linux/susfs.h
      
      - name: Patch SUSFS header biar sinkron
        run: |
          cd kernel/include/linux
          # Hapus deklarasi lama
          sed -i '/susfs_sus_ino_for_generic_fillattr/d' susfs.h
          # Sisipkan deklarasi baru sebelum #endif terakhir
          sed -i '/#endif/i extern int susfs_sus_kstat(struct kstat *stat, struct inode *inode);' susfs.h
          echo "=== SUSFS header patched ==="
          grep "susfs_sus_kstat" susfs.h
                  
      - name: Auto-replace komentar #endif biar clean
        run: |
          cd kernel/include/linux
          # Ganti semua #endif // ... jadi #endif /* ... */
          sed -i 's/#endif[[:space:]]*\/\/[[:space:]]*/#endif \/\* /g' susfs.h
          # Tutup komentar dengan */
          sed -i 's/#endif \/\* \(.*\)$/#endif \/\* \1 \*\//g' susfs.h
          echo "=== Semua komentar #endif sudah dibersihkan ==="
          grep "#endif" susfs.h
      
      - name: Auto-fix balance #ifndef/#endif SUSFS
        run: |
          cd kernel/include/linux
          count_ifndef=$(grep -c "#ifndef" susfs.h)
          count_endif=$(grep -c "#endif" susfs.h)
          echo "Jumlah #ifndef: $count_ifndef"
          echo "Jumlah #endif: $count_endif"
      
          if [ $count_ifndef -gt $count_endif ]; then
            echo ">>> Tambah #endif di akhir file"
            echo "#endif /* auto-fix SUSFS */" >> susfs.h
          elif [ $count_ifndef -lt $count_endif ]; then
            echo ">>> Hapus #endif berlebih di akhir file"
            sed -i '$d' susfs.h
          else
            echo ">>> Header sudah balance"
          fi
      
          echo "=== Struktur header setelah auto-fix ==="
          grep -n "#ifndef" susfs.h
          grep -n "#endif" susfs.h
      
      - name: Validasi struktur header SUSFS
        run: |
          cd kernel/include/linux
          echo "=== Cek jumlah #ifndef dan #endif ==="
          grep -n "#ifndef" susfs.h
          grep -n "#endif" susfs.h
          # Pastikan jumlahnya balance
          if [ $(grep -c "#ifndef" susfs.h) -ne $(grep -c "#endif" susfs.h) ]; then
            echo "!!! Header tidak balance, cek manual !!!"
            exit 1
          else
            echo "=== Header balance ==="
          fi
      
      - name: Patch fs/stat.c supaya pakai API baru
        run: |
          cd kernel/fs
          sed -i 's/susfs_sus_ino_for_generic_fillattr/susfs_sus_kstat/g' stat.c
          echo "=== fs/stat.c patched ==="
          grep "susfs_sus_kstat" stat.c
      
      - name: Build kernel (pakai flag dari build.sh asli raystef66)
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          make O=out ARCH=arm64 cepheus_defconfig

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify Image.gz-dtb ==="
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../InfiniR_cepheus_v3.2.0_KSUN.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfiniR-cepheus-v3.2.0-KSUN
          path: |
            InfiniR_cepheus_v3.2.0_KSUN.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb     
