name: Kernel InfiniR A15 - ReSukiSU (fixed hooks)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (raystef66, branch 15.0)
        run: git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus kernel

      - name: Integrate ReSukiSU (setup.sh)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: Print ReSukiSU commit hash (buat debugging versi drift)
        run: |
          cd kernel/KernelSU
          echo "=== ReSukiSU commit used in this build ==="
          git log -1 --oneline
          git log -1 --format="%H %cd"

      - name: Update defconfig localversion + enable KSU/SUSFS
        run: |
          cd kernel
          sed -i 's/CONFIG_LOCALVERSION="-InfiniR_cepheus_v1.39_KSUN"/CONFIG_LOCALVERSION="-TURTLE-ReSukiSU+SUSFS-V2"/' arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          # Auto-hooks so we don't have to hand-patch things ReSukiSU can already
          # apply itself via LSM/input-handler on kernels below 6.8:
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_INPUT_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_LOCALVERSION\|CONFIG_KSU" arch/arm64/configs/cepheus_defconfig

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>

          struct dt_info;

          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"

      - name: Verify required manual hooks (stat/execve/faccessat) already present
        run: |
          cd kernel
          echo "=== Checking hooks that ReSukiSU requires at ALL kernel versions ==="
          echo "--- stat.c (ksu_handle_stat) ---"
          grep -n "ksu_handle_stat\|ksu_handle_newfstat_ret" fs/stat.c || echo "!!! MISSING - stat hook not found, needs manual patch !!!"
          echo "--- exec.c (ksu_handle_execveat / ksu_handle_execve) ---"
          grep -n "ksu_handle_execveat\|ksu_handle_execve" fs/exec.c || echo "!!! MISSING - execve hook not found, needs manual patch !!!"
          echo "--- open.c (ksu_handle_faccessat) ---"
          grep -n "ksu_handle_faccessat" fs/open.c || echo "!!! MISSING - faccessat hook not found, needs manual patch !!!"
          echo "(If any show MISSING, build will likely fail at the ReSukiSU Kbuild check step below —"
          echo " ping balik ke Claude dengan output ini kalau itu terjadi, biar dipatch manual.)"

      - name: Inject manual hook ke kernel/reboot.c (required by ReSukiSU Kbuild check - all versions)
        run: |
          cd kernel
          if ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            sed -i '/^SYSCALL_DEFINE4(reboot/i extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg4);' kernel/reboot.c
            sed -i '/if (magic1 != LINUX_REBOOT_MAGIC1/i\    ksu_handle_sys_reboot(magic1, magic2, cmd, (void __user **)&arg);' kernel/reboot.c
            echo "=== Hook injected ==="
            grep -n "ksu_handle_sys_reboot" kernel/reboot.c
          else
            echo "=== Hook sudah ada ==="
          fi

      - name: Inject setresuid hook ke kernel/sys.c (auto-hookable on <6.8, kept manual as backup)
        run: |
          cd kernel
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            python3 - << 'PYEOF'
          import re
          with open("kernel/sys.c") as f:
              content = f.read()
          old = """SYSCALL_DEFINE3(setresuid, uid_t, ruid, uid_t, euid, uid_t, suid)
          {
          \tstruct user_namespace *ns = current_user_ns();
          \tconst struct cred *old;
          \tstruct cred *new;
          \tint retval;
          \tkuid_t kruid, keuid, ksuid;

          \tkruid = make_kuid(ns, ruid);"""
          new = """SYSCALL_DEFINE3(setresuid, uid_t, ruid, uid_t, euid, uid_t, suid)
          {
          \tstruct user_namespace *ns = current_user_ns();
          \tconst struct cred *old;
          \tstruct cred *new;
          \tint retval;
          \tkuid_t kruid, keuid, ksuid;

          #ifdef CONFIG_KSU_MANUAL_HOOK
          \textern int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid);
          \t(void)ksu_handle_setresuid(ruid, euid, suid);
          #endif

          \tkruid = make_kuid(ns, ruid);"""
          assert old in content, "setresuid pattern not found, InfiniR source may have changed"
          content = content.replace(old, new)
          with open("kernel/sys.c", "w") as f:
              f.write(content)
          print("=== setresuid hook injected ===")
          PYEOF
            grep -n "ksu_handle_setresuid" kernel/sys.c
          else
            echo "=== Hook sudah ada ==="
          fi

      - name: Inject sys_read hook ke fs/read_write.c (FIXED - pakai gate ksu_init_rc_hook sesuai spek terbaru)
        run: |
          cd kernel
          python3 - << 'PYEOF'
          with open("fs/read_write.c") as f:
              content = f.read()

          # Remove the OLD unconditional vfs_read hook style if present
          old_block = """// KernelSU hook
          #ifdef CONFIG_KSU
          extern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr,
          \t\t\t       size_t *count_ptr, loff_t **pos);
          #endif

          ssize_t vfs_read(struct file *file, char __user *buf, size_t count, loff_t *pos)
          {
          \tssize_t ret;

          #ifdef CONFIG_KSU
                  ksu_handle_vfs_read(&file, &buf, &count, &pos); // call KSU fork first
          #endif

          \tif (!(file->f_mode & FMODE_READ))"""
          new_block = """ssize_t vfs_read(struct file *file, char __user *buf, size_t count, loff_t *pos)
          {
          \tssize_t ret;

          \tif (!(file->f_mode & FMODE_READ))"""
          if old_block in content:
              content = content.replace(old_block, new_block)
              print("=== old vfs_read hook removed ===")
          else:
              print("=== old vfs_read hook not found, skipping removal ===")

          # Inject the CURRENT spec: gated behind ksu_init_rc_hook, not unconditional
          old_read = """SYSCALL_DEFINE3(read, unsigned int, fd, char __user *, buf, size_t, count)
          {
          \tstruct fd f = fdget_pos(fd);
          \tssize_t ret = -EBADF;

          \tif (f.file) {"""
          new_read = """#ifdef CONFIG_KSU_MANUAL_HOOK
          extern bool ksu_init_rc_hook __read_mostly;
          extern int ksu_handle_sys_read(unsigned int fd, char __user **buf_ptr, size_t *count_ptr);
          #endif

          SYSCALL_DEFINE3(read, unsigned int, fd, char __user *, buf, size_t, count)
          {
          \tstruct fd f = fdget_pos(fd);
          \tssize_t ret = -EBADF;

          #ifdef CONFIG_KSU_MANUAL_HOOK
          \tif (unlikely(ksu_init_rc_hook))
          \t\tksu_handle_sys_read(fd, &buf, &count);
          #endif

          \tif (f.file) {"""
          assert old_read in content, "read syscall pattern not found"
          content = content.replace(old_read, new_read)

          with open("fs/read_write.c", "w") as f:
              f.write(content)
          print("=== sys_read hook injected (gated behind ksu_init_rc_hook) ===")
          PYEOF
          grep -n "ksu_handle\|ksu_init_rc_hook" fs/read_write.c

      - name: Commit perubahan lokal sebelum sync SUSFS
        run: |
          cd kernel
          git config user.email "ci@build.local"
          git config user.name "CI Build"
          git add -A
          git commit -m "local changes: defconfig + reboot/setresuid/read hooks (fixed rc_hook gate)" || echo "nothing to commit"

      - name: Upgrade SUSFS ke v2.1.0 (sinkron sama InfiniR 16.0-ksun)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h
          grep "SUSFS_VERSION" include/linux/susfs.h

      - name: Sinkronkan fs/stat.c dengan SUSFS v2.1.0 lalu fix untuk ReSukiSU (2-arg -> 3-arg)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/stat.c" -o fs/stat.c
          sed -i 's/extern int ksu_handle_stat(int \*dfd, const char __user \*\*filename_user);/extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);/' fs/stat.c
          sed -i 's/ksu_handle_stat(&dfd, &filename); \/\/ call KSU hook first/ksu_handle_stat(\&dfd, \&filename, \&flags); \/\/ call KSU hook first/' fs/stat.c
          grep -n "ksu_handle_stat" fs/stat.c
          echo "!!! NOTE: fs/stat.c just got overwritten by the 16.0-ksun copy above."
          echo "!!! Kalau step 'Verify required manual hooks' di atas tadi PASS untuk stat.c,"
          echo "!!! cek lagi di sini apakah masih ada ksu_handle_newfstat_ret (return-value hook)."
          echo "!!! Kalau hilang, itu wajib ditambah manual sesuai docs ReSukiSU."
          grep -n "ksu_handle_newfstat_ret" fs/stat.c || echo ">>> ksu_handle_newfstat_ret MISSING after susfs sync — perlu dipatch manual!"

      - name: Sinkronkan fs/proc/task_mmu.c juga (biasanya sepaket sama stat.c)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/proc/task_mmu.c" -o fs/proc/task_mmu.c
          grep -c "susfs" fs/proc/task_mmu.c

      - name: Fix susfs_try_umount unguarded call site bug (CONFIG_KSU_SUSFS_TRY_UMOUNT tidak ada di ReSukiSU) + tambahkan susfs_extra_works
        run: |
          cd kernel
          python3 - << 'PYEOF'
          with open("fs/susfs.c") as f:
              content = f.read()

          content = content.replace(
              "/* try_umount */\n#ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT\n",
              "/* try_umount */\n"
          )
          content = content.replace(
              "\t}\n}\n#endif // #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT\n\n/* spoof_uname */",
              "\t}\n}\n\n/* spoof_uname */"
          )

          extra_works = '''/* susfs_extra_works: required by ReSukiSU's kernel_umount.c but not
           * implemented by this SUSFS v2.1.0 source — safe no-op. */
          static void susfs_extra_works_fn(struct work_struct *work)
          {
          }
          struct work_struct susfs_extra_works = __WORK_INITIALIZER(susfs_extra_works, susfs_extra_works_fn);

          /* try_umount */'''
          content = content.replace("/* try_umount */", extra_works, 1)

          with open("fs/susfs.c", "w") as f:
              f.write(content)
          print("=== susfs.c patched ===")
          PYEOF

          python3 - << 'PYEOF'
          with open("include/linux/susfs.h") as f:
              content = f.read()

          old_struct = """/* try_umount */
          #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT
          struct st_susfs_try_umount {
          \tchar                                    target_pathname[SUSFS_MAX_LEN_PATHNAME];
          \tint                                     mnt_mode;
          \tint                                     err;
          };

          struct st_susfs_try_umount_list {
          \tstruct list_head                        list;
          \tstruct st_susfs_try_umount              info;
          };
          #endif"""
          new_struct = """/* try_umount */
          struct st_susfs_try_umount {
          \tchar                                    target_pathname[SUSFS_MAX_LEN_PATHNAME];
          \tint                                     mnt_mode;
          \tint                                     err;
          };

          struct st_susfs_try_umount_list {
          \tstruct list_head                        list;
          \tstruct st_susfs_try_umount              info;
          };"""
          assert old_struct in content, "try_umount struct block not found, header may have changed"
          content = content.replace(old_struct, new_struct)

          old_decl = """/* try_umount */
          #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT
          void susfs_add_try_umount(void __user **user_info);
          void susfs_try_umount(uid_t uid);
          #endif // #ifdef CONFIG_KSU_SUSFS_TRY_UMOUNT"""
          new_decl = """/* try_umount */
          void susfs_add_try_umount(void __user **user_info);
          void susfs_try_umount(uid_t uid);"""
          assert old_decl in content, "try_umount declaration block not found, header may have changed"
          content = content.replace(old_decl, new_decl)

          with open("include/linux/susfs.h", "w") as f:
              f.write(content)
          print("=== susfs.h patched ===")
          PYEOF
          grep -n "susfs_extra_works\|try_umount" fs/susfs.c include/linux/susfs.h | head -10

      - name: Build kernel (pakai flag dari build.sh asli raystef66)
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          make O=out ARCH=arm64 cepheus_defconfig

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify Image.gz-dtb ==="
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image kernel-pure.img
          cd AnyKernel3 && zip -r9 ../InfiniR_cepheus_ReSukiSU_SUSFS-V2.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfiniR-cepheus-ReSukiSU-SUSFS-V2
          path: |
            InfiniR_cepheus_ReSukiSU_SUSFS-V2.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel-pure.img
