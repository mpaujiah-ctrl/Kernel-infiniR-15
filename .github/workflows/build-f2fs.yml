name: Kernel InfiniR A15 - Upgrade KSUN 3.2.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (raystef66, branch 15.0)
        run: git clone --depth=1 -b 15.0 https://github.com/raystef66/kernel_xiaomi_cepheus kernel

      - name: Upgrade KernelSU-Next dari v1.39 (81dff86) ke v3.2.0 (00cb93e)
        run: |
          cd kernel
          rm -rf KernelSU-Next
          mkdir -p KernelSU-Next
          curl -sL "https://github.com/rifsxd/KernelSU-Next/archive/00cb93e0bc8bf3ca3680c7e8a3d7cf11d0b59071.tar.gz" -o ksun.tar.gz
          tar -xzf ksun.tar.gz -C KernelSU-Next --strip-components=1
          rm ksun.tar.gz
          ls KernelSU-Next/kernel/

      - name: Fix KSU_VERSION fallback (karena pakai tarball, bukan git clone)
        run: |
          cd kernel
          sed -i 's/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := 33129/' KernelSU-Next/kernel/Kbuild
          grep "KSU_VERSION_FALLBACK" KernelSU-Next/kernel/Kbuild
      
      - name: Update defconfig localversion
        run: |
          cd kernel
          sed -i 's/CONFIG_LOCALVERSION="-InfiniR_cepheus_v1.39_KSUN"/CONFIG_LOCALVERSION="-TURTLE-KSUN_3.2.0+SUSFS-V2"/' arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_LOCALVERSION" arch/arm64/configs/cepheus_defconfig

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          
          struct dt_info;
          
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"
      
      - name: Upgrade SUSFS ke v2.1.0 (sinkron sama KSUN 3.2.0)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h
          grep "SUSFS_VERSION" include/linux/susfs.h

      - name: Sinkronkan fs/stat.c dengan SUSFS v2.1.0 (fix undefined symbol)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/stat.c" -o fs/stat.c
          grep -c "susfs" fs/stat.c

      - name: Sinkronkan fs/proc/task_mmu.c juga (biasanya sepaket sama stat.c)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/proc/task_mmu.c" -o fs/proc/task_mmu.c
          grep -c "susfs" fs/proc/task_mmu.c
                  
      - name: Inject 5 manual hook wajib KSUN (exec.c, open.c, read_write.c, stat.c, reboot.c)
        run: |
          cd kernel
          python3 - << 'PYEOF'
          import re, sys

          def patch(path, extern_anchor_pattern, extern_code, call_anchor_pattern, call_code, tag):
              with open(path, "r") as f:
                  src = f.read()

              if tag in src:
                  print(f"[{path}] {tag} sudah ada, skip")
                  return

              m = re.search(extern_anchor_pattern, src)
              if not m:
                  print(f"[{path}] GAGAL: extern anchor gak ketemu -> {extern_anchor_pattern}")
                  sys.exit(1)
              insert_at = m.start()
              src = src[:insert_at] + extern_code + src[insert_at:]

              m2 = re.search(call_anchor_pattern, src)
              if not m2:
                  print(f"[{path}] GAGAL: call anchor gak ketemu -> {call_anchor_pattern}")
                  sys.exit(1)
              insert_at2 = m2.start()
              src = src[:insert_at2] + call_code + src[insert_at2:]

              with open(path, "w") as f:
                  f.write(src)
              print(f"[{path}] {tag} berhasil di-patch")

          # 1. fs/exec.c -> ksu_handle_execveat
          patch(
              "fs/exec.c",
              r"int do_execve\(struct filename \*filename,",
              "#ifdef CONFIG_KSU\n"
              "__attribute__((hot))\n"
              "extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,\n"
              "\t\t\t\tvoid *argv, void *envp, int *flags);\n"
              "#endif\n\n",
              r"return do_execveat_common\(AT_FDCWD, filename, argv, envp, 0\);",
              "#ifdef CONFIG_KSU\n\tksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);\n#endif\n\t",
              "KSU_HOOK_EXEC",
          )

          # 2. fs/open.c -> ksu_handle_faccessat
          patch(
              "fs/open.c",
              r"SYSCALL_DEFINE3\(faccessat, int, dfd, const char __user \*, filename, int, mode\)",
              "#ifdef CONFIG_KSU\n"
              "__attribute__((hot))\n"
              "extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user,\n"
              "\t\t\t\tint *mode, int *flags);\n"
              "#endif\n\n",
              r"if \(mode & ~S_IRWXO\)",
              "#ifdef CONFIG_KSU\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif\n\n\t",
              "KSU_HOOK_FACCESSAT",
          )

          # 3. fs/read_write.c -> ksu_handle_sys_read
          patch(
              "fs/read_write.c",
              r"SYSCALL_DEFINE3\(read, unsigned int, fd, char __user \*, buf, size_t, count\)",
              "#ifdef CONFIG_KSU\n"
              "extern bool ksu_vfs_read_hook __read_mostly;\n"
              "extern __attribute__((cold)) int ksu_handle_sys_read(unsigned int fd,\n"
              "\t\t\t\tchar __user **buf_ptr, size_t *count_ptr);\n"
              "#endif\n\n",
              r"if \(f\.file\) \{",
              "#ifdef CONFIG_KSU\n\tif (unlikely(ksu_vfs_read_hook))\n\t\tksu_handle_sys_read(fd, &buf, &count);\n#endif\n\t",
              "KSU_HOOK_VFSREAD",
          )

          # 4. fs/stat.c -> ksu_handle_stat
          patch(
              "fs/stat.c",
              r"SYSCALL_DEFINE4\(newfstatat, int, dfd, const char __user \*, filename,",
              "#ifdef CONFIG_KSU\n"
              "__attribute__((hot))\n"
              "extern int ksu_handle_stat(int *dfd, const char __user **filename_user,\n"
              "\t\t\t\tint *flags);\n"
              "#endif\n\n",
              r"error = vfs_fstatat\(dfd, filename, &stat, flag\);",
              "#ifdef CONFIG_KSU\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif\n\t",
              "KSU_HOOK_STAT",
          )

          # 5. kernel/reboot.c -> ksu_handle_sys_reboot
          patch(
              "kernel/reboot.c",
              r"SYSCALL_DEFINE4\(reboot, int, magic1, int, magic2, unsigned int, cmd,",
              "#ifdef CONFIG_KSU\n"
              "extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n"
              "#endif\n\n",
              r"/\* We only trust the superuser with rebooting the system\. \*/",
              "#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n\t",
              "KSU_HOOK_REBOOT",
          )
          PYEOF
          echo "=== Ringkasan hook yang kepasang ==="
          grep -rn "ksu_handle_" fs/exec.c fs/open.c fs/read_write.c fs/stat.c kernel/reboot.c

      - name: Verify hook call-sites (verify_ksu_hooks.py)
        run: |
          cd kernel
          # Asumsi verify_ksu_hooks.py ada di root repo (bukan di folder kernel/).
          # Sesuaikan path di bawah kalau lokasinya beda.
          python3 ../verify_ksu_hooks.py --kernel-dir . || {
            echo "Verifikasi hook GAGAL — cek output di atas sebelum lanjut build.";
            exit 1;
          }

      - name: Commit perubahan lokal sebelum cherry-pick
        run: |
          cd kernel
          git config user.email "ci@build.local"
          git config user.name "CI Build"
          git add -A
          git commit -m "local changes: defconfig + 5 KSUN manual hooks (exec/open/read_write/stat/reboot)" || echo "nothing to commit"
      
      - name: Enable F2FS optimization di defconfig
        run: |
          cd kernel
          cat >> arch/arm64/configs/cepheus_defconfig << 'EOF'
          CONFIG_F2FS_FS=y
          CONFIG_F2FS_FS_XATTR=y
          CONFIG_F2FS_FS_POSIX_ACL=y
          CONFIG_F2FS_FS_ENCRYPTION=y
          CONFIG_F2FS_FS_SECURITY=y
          CONFIG_F2FS_FS_COMPRESSION=y
          CONFIG_F2FS_CHECK_FS=y
          EOF
          echo "=== F2FS options added ==="
          grep "CONFIG_F2FS" arch/arm64/configs/cepheus_defconfig
      
      - name: Build kernel (pakai flag dari build.sh asli raystef66)
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          make O=out ARCH=arm64 cepheus_defconfig

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify Image.gz-dtb ==="
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image kernel-pure.img
          cd AnyKernel3 && zip -r9 ../InfiniR_cepheus_v3.2.0_KSUN.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfiniR-cepheus-v3.2.0-KSUN
          path: |
            InfiniR_cepheus_v3.2.0_KSUN.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel-pure.img
